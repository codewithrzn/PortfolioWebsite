<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Meta Setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Netflix India – Watch TV Shows Online</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet" href="chat.css">
</head>

<body>

    <!-- ================= HERO SECTION ================= -->
    <header class="hero">

        <!-- NAVBAR -->
        <nav class="navbar">
            <img src="images/logo.svg" alt="Netflix Logo" class="logo">

            <div class="nav-buttons">
                <button class="btn btn-outline">English</button>
                <button class="btn btn-primary btn-small">Sign In</button>
            </div>
        </nav>

        <!-- HERO CONTENT -->
        <div class="hero-content">
            <h1>Unlimited movies, TV shows and more.</h1>
            <h3>Watch anywhere. Cancel anytime.</h3>
            <p>Ready to watch? Enter your email to create or restart your membership.</p>

            <div class="cta">
                <input type="email" placeholder="Email address" required>
                <button class="btn btn-primary">Get Started &gt;</button>
            </div>
        </div>

    </header>

    <!-- SECTION DIVIDER -->
    <div class="divider"></div>

</body>

</html>
